<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KekeIntel Panel - Restore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0f14;
color:#fff;
}

.sidebar{
width:240px;
height:100vh;
background:#111521;
position:fixed;
top:0;
left:0;
padding:20px;
}

.sidebar h2{
color:#00ff88;
}

.btn{
width:100%;
padding:12px;
margin:8px 0;
background:#1a2030;
border:none;
color:#fff;
cursor:pointer;
border-radius:8px;
transition:0.2s;
}

.btn:hover{
background:#00ff88;
color:#000;
}

.main{
margin-left:260px;
padding:20px;
}

.card{
background:#151a26;
padding:15px;
border-radius:10px;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
outline:none;
background:#0f1320;
color:#fff;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>KekeIntel</h2>

<button class="btn" onclick="showPage('dashboard')">Dashboard</button>
<button class="btn" onclick="showPage('scanner')">Username Scanner</button>
<button class="btn" onclick="showPage('discord')">Discord ID Scanner</button>
<button class="btn" onclick="showPage('settings')">Settings</button>
</div>

<div class="main">

<div id="dashboard" class="page">
<h1>Dashboard</h1>
<div class="card">System Status: <span style="color:#00ff88">ACTIVE</span></div>
</div>

<div id="scanner" class="page" style="display:none;">
<h1>Username Scanner</h1>
<input id="usernameInput" placeholder="Username gir...">
<button class="btn" onclick="runUsernameScan()">ARA</button>
<div class="card" id="scanResult">Sonuç bekleniyor...</div>
</div>

<div id="discord" class="page" style="display:none;">
<h1>Discord ID Scanner</h1>
<input id="discordInput" placeholder="Discord ID gir...">
<button class="btn" onclick="runDiscordScan()">TARA</button>
<div class="card" id="discordResult">Sonuç bekleniyor...</div>
</div>

<div id="settings" class="page" style="display:none;">
<h1>Settings</h1>
<div class="card">Theme: Dark Mode (Locked)</div>
</div>

</div>

<script>

function showPage(page){
document.querySelectorAll('.page').forEach(p => p.style.display = "none");
document.getElementById(page).style.display = "block";
}

function runUsernameScan(){
let user = document.getElementById("usernameInput").value;

if(!user){
document.getElementById("scanResult").innerText = "Username gir!";
return;
}

document.getElementById("scanResult").innerText =
"Scanning: " + user + " ... (mock result)\nInstagram: found\nTikTok: checking...\nDiscord: not found";
}

function runDiscordScan(){
let id = document.getElementById("discordInput").value;

if(!id){
document.getElementById("discordResult").innerText = "ID gir!";
return;
}

document.getElementById("discordResult").innerText =
"Scanning Discord ID: " + id + "\nStatus: VALID (mock)\nData: limited access";
}

</script>

</body>
</html>
