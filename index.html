<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KekeIntel Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    color:#fff;
    overflow:hidden;
    height:100vh;

    background:
        linear-gradient(
            rgba(0,0,0,.75),
            rgba(0,0,0,.75)
        ),
        url("eyes.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* LOGIN */

#loginBox{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:380px;
    padding:22px;

    background:rgba(15,18,25,.70);
    backdrop-filter:blur(10px);

    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 0 40px rgba(0,0,0,.7),
        0 0 80px rgba(79,124,255,.15);
}

#loginBox h2{
    text-align:center;
    margin-bottom:18px;
    color:#4f7cff;
    font-size:34px;
}

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;

    background:#090c12;
    color:white;

    outline:none;
    font-size:14px;
}

input:focus{
    box-shadow:0 0 10px rgba(79,124,255,.4);
}

button{
    width:100%;
    padding:14px;
    margin-top:16px;

    border:none;
    border-radius:10px;

    background:#4f7cff;
    color:white;

    font-weight:bold;
    cursor:pointer;

    transition:.2s;
}

button:hover{
    background:#3f6eff;
    transform:translateY(-1px);
}

#error{
    margin-top:12px;
    text-align:center;
    color:#ff4d4d;
}

/* DASHBOARD */

#dashboard{
    display:none;
    height:100vh;
}

.sidebar{
    width:240px;
    background:#111521;
    padding:20px;
}

.sidebar h2{
    color:#4f7cff;
    margin-bottom:20px;
}

.menu div{
    background:#1a2030;
    padding:12px;
    border-radius:8px;
    margin-bottom:8px;
    cursor:pointer;
    transition:.2s;
}

.menu div:hover{
    background:#27314a;
}

.main{
    flex:1;
    padding:25px;
}

.card{
    background:#151922;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div id="loginBox">

    <h2>KekeIntel Login</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Giriş Yap</button>

    <p id="error"></p>

</div>

<div id="dashboard">

    <div class="sidebar">

        <h2>KekeIntel</h2>

        <div class="menu">
            <div onclick="showPage('home')">🏠 Dashboard</div>
            <div onclick="showPage('tools')">🛠 Tools</div>
            <div onclick="showPage('api')">📡 API Status</div>
            <div onclick="logout()">🚪 Logout</div>
        </div>

    </div>

    <div class="main" id="content">

        <h2>Dashboard</h2>

        <div class="card">🟢 Sistem Durumu: Aktif</div>
        <div class="card">🔵 API Status: Online</div>
        <div class="card">👤 Kullanıcı: Admin</div>

    </div>

</div>

<script>
function login(){

    const user=document.getElementById("user").value.trim();
    const pass=document.getElementById("pass").value.trim();

    if(user==="admin" && pass==="admin"){

        document.getElementById("loginBox").style.display="none";

        const dash=document.getElementById("dashboard");
        dash.style.display="flex";

    }else{

        document.getElementById("error").innerText="Hatalı giriş!";
    }
}

function logout(){
    location.reload();
}

function showPage(page){

    const content=document.getElementById("content");

    if(page==="home"){
        content.innerHTML=`
        <h2>Dashboard</h2>
        <div class="card">🟢 Sistem Durumu: Aktif</div>
        <div class="card">🔵 API Status: Online</div>
        <div class="card">👤 Kullanıcı: Admin</div>`;
    }

    if(page==="tools"){
        content.innerHTML=`
        <h2>Tools</h2>
        <div class="card">IP Lookup</div>
        <div class="card">Domain Lookup</div>
        <div class="card">DNS Checker</div>`;
    }

    if(page==="api"){
        content.innerHTML=`
        <h2>API Status</h2>
        <div class="card">🟢 Main API Online</div>
        <div class="card">🟢 Backup API Online</div>`;
    }
}
</script>

</body>
</html>
