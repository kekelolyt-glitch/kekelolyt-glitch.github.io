<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KekeIntel Restore Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0d0f14;
color:#fff;
}

.sidebar{
width:240px;
height:100vh;
background:#111521;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#00ff88;
}

.btn{
width:100%;
padding:12px;
margin:8px 0;
background:#1a2030;
border:none;
color:#fff;
cursor:pointer;
border-radius:8px;
}

.btn:hover{
background:#00ff88;
color:#000;
}

.main{
margin-left:260px;
padding:20px;
}

.card{
background:#151a26;
padding:15px;
border-radius:10px;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
background:#0f1320;
border:none;
color:#fff;
border-radius:6px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>KekeIntel</h2>

<button class="btn" onclick="show('dash')">Dashboard</button>
<button class="btn" onclick="show('scan')">Discord Scanner</button>
</div>

<div class="main">

<div id="dash">
<h1>Dashboard</h1>
<div class="card">Status: <span style="color:#00ff88">ACTIVE</span></div>
</div>

<div id="scan" style="display:none;">
<h1>Discord ID Scanner</h1>

<input id="id" placeholder="Discord ID gir">
<button class="btn" onclick="scan()">SORGULA</button>

<div class="card" id="out">Sonuç bekleniyor...</div>
</div>

</div>

<script>

function show(id){
document.getElementById("dash").style.display="none";
document.getElementById("scan").style.display="none";
document.getElementById(id).style.display="block";
}

async function scan(){
let id = document.getElementById("id").value;

if(!id){
document.getElementById("out").innerText = "ID gir!";
return;
}

let res = await fetch("/api/discord?id=" + id);
let data = await res.json();

document.getElementById("out").innerText =
"ID: " + data.id + "\n" +
"Username: " + data.username + "\n" +
"Tag: " + data.tag + "\n" +
"Created: " + data.created + "\n" +
"Status: " + data.status;
}

</script>

</body>
</html>
