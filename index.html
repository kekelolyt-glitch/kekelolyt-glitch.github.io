<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KekeIntel Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    color:#fff;
    overflow:hidden;
    height:100vh;

    background:
        linear-gradient(
            rgba(0,0,0,.92),
            rgba(0,0,0,.92)
        ),
        url("eyes.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

/* LOGIN */

#loginBox{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:420px;
    padding:28px;

    background:rgba(8,10,15,.85);

    backdrop-filter:blur(18px);

    border-radius:18px;

    border:1px solid rgba(79,124,255,.15);

    box-shadow:
        0 0 40px rgba(0,0,0,.9),
        0 0 80px rgba(79,124,255,.15);
}
#loginBox h2{
    text-align:center;
    margin-bottom:25px;

    color:#6f9cff;

    font-size:38px;
    letter-spacing:2px;

    text-shadow:
        0 0 15px rgba(79,124,255,.4);
}

input{
    width:100%;
    padding:15px;

    margin-top:14px;

    background:#05070d;

    border:1px solid rgba(255,255,255,.05);

    border-radius:12px;

    color:white;
}

input:focus{
    box-shadow:0 0 10px rgba(79,124,255,.4);
}

button{
    width:100%;
    padding:15px;

    margin-top:18px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
        90deg,
        #355dff,
        #4f7cff
    );

    color:white;

    font-weight:bold;
}

button:hover{
    background:#3f6eff;
    transform:translateY(-1px);
}

#error{
    margin-top:12px;
    text-align:center;
    color:#ff4d4d;
}

/* DASHBOARD */

#dashboard{
    display:none;
    height:100vh;

    background:
    linear-gradient(
        180deg,
        #04060a,
        #090d16
    );
}

.sidebar{
    width:240px;
    background:#111521;
    padding:20px;
}

.sidebar h2{
    color:#4f7cff;
    margin-bottom:20px;
}

.menu div{
    background:#1a2030;
    padding:12px;
    border-radius:8px;
    margin-bottom:8px;
    cursor:pointer;
    transition:.2s;
}

.menu div:hover{
    background:#27314a;
}

.main{
    flex:1;
    padding:25px;
}

.card{
    background:#151922;
    padding:18px;
    border-radius:12px;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div id="loginBox">

    <h2>keke#1337</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Giriş Yap</button>

    <p id="error"></p>

</div>

<div id="dashboard">

    <div class="sidebar">

        <h2>kekebyte #1337</h2>

<div class="menu">
    <div onclick="showPage('home')">🏠 Dashboard</div>
    <div onclick="showPage('iplookup')">🌐 IP Lookup</div>
    <div onclick="showPage('email')">📧 Email Validator</div>
    <div onclick="showPage('whois')">🌍 WHOIS Lookup</div>
    <div onclick="showPage('dns')">🌐 DNS Lookup</div>
    <div onclick="showPage('api')">📡 API Status</div>
    <div onclick="logout()">🚪 Logout</div>
</div>

    </div>

    <div class="main" id="content">

        <h2>Dashboard</h2>

        <div class="card">🟢 Sistem Durumu: Aktif</div>
        <div class="card">🔵 API Status: Online</div>
        <div class="card">👤 Kullanıcı: Admin</div>

    </div>

</div>

<script>
function login(){

    const user=document.getElementById("user").value.trim();
    const pass=document.getElementById("pass").value.trim();

    if(user==="admin" && pass==="admin"){

        document.body.style.background =
        "#05070d";

        document.getElementById("loginBox").style.display="none";

        document.getElementById("dashboard").style.display="flex";

    }else{
        document.getElementById("error").innerText="Hatalı giriş!";
    }
}

function logout(){
    location.reload();
}

function showPage(page){

    const content=document.getElementById("content");

    if(page==="home"){
        content.innerHTML=`
        <h2>Dashboard</h2>
        <div class="card">🟢 Sistem Durumu: Aktif</div>
        <div class="card">🔵 API Status: Online</div>
        <div class="card">👤 Kullanıcı: Admin</div>`;
    }

    if(page==="iplookup"){
        content.innerHTML=`
        <h2>🌐 IP Lookup</h2>

        <div class="card">
            <input id="ipInput" placeholder="8.8.8.8">
            <button onclick="lookupIP()">Sorgula</button>
        </div>

        <div class="card" id="ipResult">
            Sonuç burada görünecek.
        </div>`;
    }

    if(page==="email"){
        content.innerHTML=`
        <h2>📧 Email Validator</h2>

        <div class="card">
            <input id="emailInput" placeholder="example@gmail.com">
            <button onclick="validateEmail()">Kontrol Et</button>
        </div>

        <div class="card" id="emailResult">
            Sonuç burada görünecek.
        </div>`;
    }
if(page==="whois"){
    content.innerHTML=`
    <h2>🌍 WHOIS Lookup</h2>

    <div class="card">
        <input id="domainInput" placeholder="example.com">
        <button onclick="lookupDomain()">Sorgula</button>
    </div>

    <div class="card" id="domainResult">
        Sonuç burada görünecek.
    </div>`;
}
    if(page==="api"){
        content.innerHTML=`
        <h2>API Status</h2>
        <div class="card">🟢 Main API Online</div>
        <div class="card">🟢 Backup API Online</div>`;
    }
}
async function lookupIP(){

    const ip=document.getElementById("ipInput").value.trim();

    if(!ip){
        alert("IP gir.");
        return;
    }

    const result=document.getElementById("ipResult");

    result.innerHTML="🔄 Sorgulanıyor...";

    try{

        const response=await fetch(
            `https://ipapi.co/${ip}/json/`
        );

        const data=await response.json();

        result.innerHTML=`
        <h3>Sonuç</h3>
        <b>IP:</b> ${data.ip || "-"}<br>
        <b>Ülke:</b> ${data.country_name || "-"}<br>
        <b>Şehir:</b> ${data.city || "-"}<br>
        <b>Bölge:</b> ${data.region || "-"}<br>
        <b>ISP:</b> ${data.org || "-"}<br>
        <b>ASN:</b> ${data.asn || "-"}
        `;

    }catch(error){

        result.innerHTML="❌ Sorgu başarısız.";
    }
}
if(page==="dns"){
    content.innerHTML=`
    <h2>🌐 DNS Lookup</h2>

    <div class="card">
        <input id="dnsInput" placeholder="example.com">
        <button onclick="lookupDNS()">Sorgula</button>
    </div>

    <div class="card" id="dnsResult">
        Sonuç burada görünecek.
    </div>`;
}

function validateEmail(){

    const email=document.getElementById("emailInput").value.trim();

    const result=document.getElementById("emailResult");

    const regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(regex.test(email)){
        result.innerHTML="✅ Geçerli email formatı";
    }else{
        result.innerHTML="❌ Geçersiz email formatı";
    }
}
async function lookupDomain(){
async function lookupDNS(){

    const domain =
        document.getElementById("dnsInput").value.trim();

    const result =
        document.getElementById("dnsResult");

    if(!domain){
        result.innerHTML="Domain gir.";
        return;
    }

    result.innerHTML="🔄 Sorgulanıyor...";

    try{

        const response = await fetch(
            `https://dns.google/resolve?name=${domain}&type=A`
        );

        const data = await response.json();

        if(!data.Answer){
            result.innerHTML="Kayıt bulunamadı.";
            return;
        }

        let html = `<h3>${domain}</h3>`;

        data.Answer.forEach(record => {

            html += `
            <div style="margin-bottom:10px">
                <b>IP:</b> ${record.data}
            </div>`;
        });

        result.innerHTML = html;

    }catch(err){

        result.innerHTML =
        "❌ DNS sorgusu başarısız.";
    }
}

    const domain =
        document.getElementById("domainInput").value.trim();

    const result =
        document.getElementById("domainResult");

    if(!domain){
        result.innerHTML="Domain gir.";
        return;
    }

    result.innerHTML=`
        <b>Domain:</b> ${domain}<br>
        <b>Durum:</b> Test başarılı
    `;
}
</script>

</body>
</html>
